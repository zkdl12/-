<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANI LAB - T1 LEGEND Builder</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

        :root {
            --t1-black: #000000;
            --t1-dark-gray: #1a1a1a;
            --t1-red: #e4002b;
            --t1-gold: #c6a771;
            --team-blue: #0089ff;
            --team-red: #ff3e3e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background: linear-gradient(180deg, #111111 0%, var(--t1-black) 100%);
            font-family: 'Pretendard', sans-serif;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; padding: 20px;
        }

        .container {
            background: var(--t1-dark-gray);
            width: 100%; max-width: 600px;
            border-radius: 30px; padding: 30px;
            border: 3px solid var(--t1-gold);
            box-shadow: 0 0 30px rgba(198, 167, 113, 0.3);
            margin: auto;
            transition: transform 0.1s ease; /* 셔플 흔들림 효과용 */
        }

        .top-visual { text-align: center; margin-bottom: 20px; }
        .game-logo-main { width: 100%; max-height: 250px; border-radius: 20px; object-fit: cover; border: 2px solid var(--t1-gold); }

        header { text-align: center; margin-bottom: 25px; }
        header h1 { font-size: 1.8rem; font-weight: 900; color: #ffffff; text-transform: uppercase; letter-spacing: -1px; }
        header h1 span { color: var(--t1-red); }

        .team-labels { display: flex; justify-content: space-between; padding: 0 60px; margin-bottom: 15px; font-weight: 900; font-size: 1rem; }
        .label.blue { color: var(--team-blue); }
        .label.red { color: var(--team-red); }

        .lane-row { 
            display: flex; align-items: center; gap: 10px; margin-bottom: 8px; 
            padding: 8px; border-radius: 18px; 
            background: rgba(255,255,255,0.03); 
            transition: 0.3s ease; border: 1px solid rgba(255,255,255,0.05); 
        }

        .lane-tag { 
            width: 35px; height: 35px;
            font-size: 0.75rem; font-weight: 900; 
            color: #000; 
            background: var(--t1-gold); 
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px; border: none; flex-shrink: 0;
            text-transform: uppercase;
        }

        .player-input { 
            flex: 1; height: 45px; background: #222; border: 2px solid #444; 
            border-radius: 12px; padding: 0 12px; font-weight: 700; font-size: 16px; 
            color: #ffffff; outline: none; width: 40%; text-align: center; 
            transition: border-color 0.2s, background 0.2s, transform 0.1s;
        }
        .player-input:focus { border-color: var(--t1-gold); background: #2a2a2a; }

        /* 셔플 애니메이션 클래스 */
        @keyframes shuffleInput {
            0% { transform: translateY(0); opacity: 1; }
            20% { transform: translateY(-10px); opacity: 0.5; }
            50% { transform: translateY(10px); opacity: 0.5; }
            80% { transform: translateY(-5px); opacity: 0.8; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .shuffling { animation: shuffleInput 0.4s ease-in-out; }

        /* 컨테이너 흔들림 애니메이션 */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-1deg); }
            40% { transform: translate(-3px, 0px) rotate(1deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            80% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shake-effect { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }

        .lock-btn-t1 { 
            background-color: #222;
            background-image: url('t1_logo.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 2px solid #444;
            border-radius: 12px;
            height: 45px; width: 45px; cursor: pointer; flex-shrink: 0; 
            transition: 0.3s ease;
            filter: grayscale(100%);
            opacity: 0.4;
        }
        
        .lock-btn-t1.active { 
            filter: grayscale(0%);
            opacity: 1;
            background-color: #000;
            border-color: var(--t1-red);
            box-shadow: 0 0 15px var(--t1-red);
            transform: scale(1.1);
        }

        .lane-row.locked-row { background-color: rgba(228, 0, 43, 0.15); border-color: var(--t1-red); }
        .lane-row.locked-row .player-input { background-color: #1a1a1a; color: rgba(255,255,255,0.4); border-color: rgba(228, 0, 43, 0.3); }
        .lane-row.locked-row .lane-tag { background: #500; color: #fff; }

        footer { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
        .main-btn { background: #000; color: var(--t1-gold); border: 3px solid var(--t1-gold); padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; font-size: 1.2rem; transition: 0.3s; position: relative; overflow: hidden; }
        .main-btn:active { transform: scale(0.95); }
        .main-btn:hover { background: var(--t1-gold); color: #000; }

        .footer-buttons { display: flex; gap: 10px; }
        .sub-btn { flex: 1; background: #222; border: 2px solid #444; padding: 14px; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 0.95rem; color: #aaa; transition: 0.2s; }
        .sub-btn:active { transform: scale(0.95); }
        .highlight { background: rgba(228, 0, 43, 0.1); border-color: rgba(228, 0, 43, 0.5); color: var(--team-red); }

        .home-btn-text { background: transparent; color: #888; border: none; cursor: pointer; font-weight: 700; margin-top: 20px; width: 100%; font-size: 0.95rem; text-decoration: underline; }

        @media (max-width: 480px) {
            .container { padding: 25px 15px; }
            .lock-btn-t1 { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <div class="top-visual">
            <img src="https://stimg.sooplive.com/NORMAL_BBS/6/7137696/958869b0582499786.gif" class="game-logo-main">
        </div>

        <header>
            <h1> 리그오브레전드 <span>팀 짜기</span></h1>
        </header>

        <div class="team-labels">
            <span class="label blue">🔵 BLUE TEAM</span>
            <span class="label red">🔴 RED TEAM</span>
        </div>

        <div id="builder-area">
            <div id="lane-rows-ck"></div>
        </div>

        <footer>
            <button class="main-btn shuffle" id="shuffle-btn" onclick="shuffleTeams()">🪄 SHUFFLE</button>
            <div class="footer-buttons">
                <button class="sub-btn" onclick="resetInputs()">🔄 RESET</button>
                <button class="sub-btn highlight" onclick="copyResult()">📋 결과 복사</button>
            </div>
        </footer>
        
        <button class="home-btn-text" onclick="location.href='team.html'">← 게임 선택으로 돌아가기</button>
    </div>

    <script>
        const lanes = ['TOP', 'JNG', 'MID', 'ADC', 'SPT'];
        let shuffleCount = 0;
        let isShuffling = false;

        window.onload = function() {
            const container = document.getElementById('lane-rows-ck');
            container.innerHTML = lanes.map(lane => `
                <div class="lane-row">
                    <div class="lane-tag">${lane}</div>
                    <input type="text" class="player-input" placeholder="BLUE ${lane}">
                    <button class="lock-btn-t1" onclick="toggleLock(this)"></button>
                    <input type="text" class="player-input" placeholder="RED ${lane}">
                </div>
            `).join('');
        };

        function toggleLock(btn) {
            btn.classList.toggle('active');
            const row = btn.parentElement;
            row.classList.toggle('locked-row');
        }

        function shuffleTeams() {
            if (isShuffling) return; // 연속 클릭 방지
            isShuffling = true;

            const container = document.getElementById('main-container');
            const rows = document.querySelectorAll('.lane-row');
            
            // 1. 컨테이너 흔들림 효과
            container.classList.add('shake-effect');
            setTimeout(() => container.classList.remove('shake-effect'), 300);

            rows.forEach(row => {
                const lockBtn = row.querySelector('.lock-btn-t1');
                const inputs = row.querySelectorAll('.player-input');

                if (!lockBtn.classList.contains('active')) {
                    // 2. 입력창 애니메이션 적용
                    inputs.forEach(input => input.classList.add('shuffling'));

                    // 3. 실제 값 교체 (약간의 딜레이를 주어 애니메이션과 동기화)
                    setTimeout(() => {
                        if (Math.random() > 0.5) {
                            const temp = inputs[0].value;
                            inputs[0].value = inputs[1].value;
                            inputs[1].value = temp;
                        }
                    }, 150);

                    // 애니메이션 클래스 제거
                    setTimeout(() => {
                        inputs.forEach(input => input.classList.remove('shuffling'));
                    }, 400);
                }
            });

            shuffleCount++;
            document.getElementById('shuffle-btn').innerText = `🪄 SHUFFLE (${shuffleCount}회)`;
            
            setTimeout(() => { isShuffling = false; }, 400);
        }

       function copyResult() {
            const rows = document.querySelectorAll('.lane-row');
            let text = `[블루팀] vs [레드팀]\n`;
            
            rows.forEach(row => {
                const tag = row.querySelector('.lane-tag').innerText;
                const inputs = row.querySelectorAll('.player-input');
                const bluePlayer = inputs[0].value || '비어있음';
                const redPlayer = inputs[1].value || '비어있음';
                text += `[${tag}] ${bluePlayer} vs ${redPlayer}\n`;
            });
            
            navigator.clipboard.writeText(text).then(() => {
                alert("결과가 복사되었습니다! ✨");
            }).catch(err => {
                alert("복사에 실패했습니다.");
            });
        }

        function resetInputs() {
            document.querySelectorAll('.player-input').forEach(input => input.value = '');
            document.querySelectorAll('.lock-btn-t1').forEach(btn => {
                btn.classList.remove('active');
                btn.parentElement.classList.remove('locked-row');
            });
            shuffleCount = 0;
            document.getElementById('shuffle-btn').innerText = `🪄 SHUFFLE`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google Tag Manager -->

    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-WLFLL6GS');</script>
    <!-- End Google Tag Manager -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANI.LAB - 방셀게시판</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --t1-red: #E4002B; --bg-dark: #050505; --table-header: #0f0f0f; --table-row: #0a0a0a; --gold: #C29E5E; --border: #1a1a1a; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; font-size: 1.5rem; font-weight: 900; color: var(--gold); margin-bottom: 30px; letter-spacing: 2px; }

        details { margin-bottom: 15px; border: 1px solid var(--border); background: var(--table-header); border-radius: 4px; overflow: hidden; }
        summary { padding: 18px; cursor: pointer; font-weight: 800; color: var(--gold); list-style: none; display: flex; justify-content: space-between; align-items: center; background: #0d0d0d; }
        summary::after { content: '▶'; font-size: 0.7rem; transition: 0.3s; color: #555; }
        details[open] summary::after { transform: rotate(90deg); color: var(--t1-red); }
        details[open] summary { border-bottom: 1px solid var(--border); color: #fff; }

        .bangsel-table { width: 100%; border-collapse: collapse; }
        .table-header { background: var(--table-header); height: 45px; }
        .table-header th { font-size: 0.8rem; color: #666; font-weight: 800; padding: 0 15px; text-align: center; border-bottom: 1px solid var(--border); }
        .table-row { background: var(--table-row); border-bottom: 1px solid var(--border); }
        .table-row td { padding: 15px; text-align: center; font-size: 0.95rem; font-weight: 700; color: #ccc; }
        .td-name { color: #fff !important; font-weight: 900 !important; }
        .td-stars { color: var(--t1-red) !important; font-size: 1.1rem !important; }
        .td-content { text-align: left !important; color: #888 !important; font-size: 0.85rem !important; }
        .link-btn { text-decoration: none; color: var(--gold); border: 1px solid var(--gold); padding: 5px 12px; font-size: 0.75rem; font-weight: 800; }

        @media (max-width: 768px) {
            .table-header { display: none; }
            .table-row { display: block; padding: 20px; border-bottom: 2px solid #1a1a1a; }
            .table-row td { display: block; text-align: left; padding: 5px 0; border: none; }
            .table-row td::before { content: attr(data-label); display: inline-block; width: 80px; color: var(--gold); font-size: 0.75rem; font-weight: 800; }
            .td-content { border-top: 1px dotted #222 !important; margin-top: 10px; padding-top: 15px !important; }
        }
    </style>
</head>
<body>
     <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WLFLL6GS"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    
    <div class="container">
        <h1>방셀게시판</h1>
        <div id="date-groups"></div>
        <p id="status-msg" style="text-align:center; color:var(--gold); margin-top:50px; font-weight:800;">데이터 로드 중...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://ilwpkjdwizzjmcmfmvig.supabase.co', 'sb_publishable_2IN7qgG_rvB6kcggisbmxA_XqInFAgy');

        async function loadBangsel() {
            const container = document.getElementById('date-groups');
            // 💡 핵심 정렬: 날짜 최신순 -> 별풍선 많은 순
            const { data, error } = await _supabase
                .from('bangsel')
                .select('*')
                .order('target_date', { ascending: false })
                .order('star_count', { ascending: false });

            if (error || !data || data.length === 0) {
                document.getElementById('status-msg').innerText = "데이터가 없습니다.";
                return;
            }

            document.getElementById('status-msg').style.display = 'none';

            const grouped = {};
            data.forEach(item => {
                if (!grouped[item.target_date]) grouped[item.target_date] = [];
                grouped[item.target_date].push(item);
            });

            const today = new Date().toISOString().split('T')[0];

            container.innerHTML = Object.keys(grouped).map(date => {
                const isOpen = (date === today) ? 'open' : '';
                return `
                <details ${isOpen}>
                    <summary>${date} 기록 (${grouped[date].length}건)</summary>
                    <table class="bangsel-table">
                        <thead class="table-header"><tr><th style="width:140px;">이름</th><th style="width:120px;">방송국</th><th style="width:130px;">펀딩개수</th><th>내용</th></tr></thead>
                        <tbody>
                            ${grouped[date].map(i => `
                            <tr class="table-row">
                                <td class="td-name" data-label="이름">${i.user_name}</td>
                                <td data-label="방송국"><a href="https://www.sooplive.com/station/${i.user_id}" target="_blank" class="link-btn">STATION</a></td>
                                <td class="td-stars" data-label="펀딩개수">${(i.star_count || 0).toLocaleString()}개</td>
                                <td class="td-content" data-label="내용">${i.content ? i.content.replace(/\//g, ' ') : ''}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </details>`;
            }).join('');
        }
        window.addEventListener('DOMContentLoaded', loadBangsel);
    </script>
</body>
</html>

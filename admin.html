<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANI.LAB - 통합 관리자 (보안)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --bg: #fff0f3; --accent: #ff007f; --sub: #ff85a1; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { background: var(--bg); padding: 20px; }
        
        /* 보안: 인증 전까지 내용 숨김 */
        #admin-content { display: none; max-width: 900px; margin: 0 auto; }
        
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; justify-content: flex-end; }
        .nav-btn { text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 0.8rem; font-weight: 800; background: #fff; color: var(--sub); border: 2px solid #ffe4e9; transition: 0.3s; }
        .nav-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; border-radius: 10px; border: 2px solid #ffe4e9; cursor: pointer; font-weight: 800; background: #fff; color: var(--sub); transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        
        .card { background: #fff; padding: 30px; border-radius: 20px; border: 3px solid #ffe4e9; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(255,133,161,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .box { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.8rem; font-weight: 800; color: var(--sub); }
        input, select { padding: 12px; border: 2px solid #eee; border-radius: 10px; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--accent); }
        
        .submit-btn { width: 100%; padding: 18px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        .table-card { overflow-x: auto; }
        .table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; min-width: 500px; }
        .table th, .table td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .table th { color: var(--sub); font-weight: 800; }
        
        .action-btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 800; font-size: 0.7rem; transition: 0.2s; }
        .edit { background: #f0f0f0; color: #666; margin-right: 5px; }
        .del { background: #ffebeb; color: #ff4d4d; }
        .action-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div id="admin-content">
    <div class="nav-bar">
        <a href="index.html" class="nav-btn">🏠 메인으로</a>
        <a href="record.html" class="nav-btn">📊 전적 페이지</a>
        <button onclick="adminLogout()" class="nav-btn" style="color:#ff4d4d;">🔓 로그아웃</button>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" id="ck-tab" onclick="switchTab('ck')">🏆 CK 전적 관리</button>
        <button class="tab-btn" id="solo-tab" onclick="switchTab('solo')">🔥 솔랭내기 관리</button>
    </div>

    <div class="card">
        <h2 id="form-title" style="color:var(--accent); margin-bottom:20px; border-left: 5px solid var(--accent); padding-left: 15px;">데이터 입력</h2>
        <form id="main-form">
            <input type="hidden" id="edit-id">
            
            <div id="ck-fields" class="grid">
                <div class="box"><label>날짜</label><input type="date" id="ck-date"></div>
                <div class="box"><label>대회명</label><input type="text" id="ck-title" placeholder="ex. 멸망전"></div>
                <div class="box"><label>결과</label><select id="ck-result"><option value="승">WIN</option><option value="패">LOSE</option></select></div>
                <div class="box"><label>스코어</label><input type="text" id="ck-score" placeholder="3:2"></div>
                
                <div class="box"><label>본인 포지션</label>
                    <select id="ck-pos">
                        <option value="TOP">TOP</option>
                        <option value="JGL">JGL</option>
                        <option value="MID">MID</option>
                        <option value="AD" selected>AD</option>
                        <option value="SUP">SUP</option>
                    </select>
                </div>
                
                <div class="box"><label>상대 BJ (방장)</label><input type="text" id="ck-opp"></div>
                <div class="box"><label>펀딩 총액 (개)</label><input type="number" id="ck-fund"></div>
                <div class="box" style="grid-column: span 2;"><label>라인업 (상대vs우리, 상대vs우리...)</label><input type="text" id="ck-mem"></div>
                <div class="box" style="grid-column: span 2;"><label>메모</label><input type="text" id="ck-memo"></div>
            </div>

            <div id="solo-fields" class="grid" style="display:none;">
                <div class="box"><label>날짜</label><input type="date" id="solo-date"></div>
                <div class="box"><label>내기 명칭</label><input type="text" id="solo-title"></div>
                <div class="box"><label>결과</label><select id="solo-result"><option value="승">WIN</option><option value="패">LOSE</option></select></div>
                <div class="box"><label>스코어</label><input type="text" id="solo-score"></div>
                <div class="box" style="grid-column: span 2;"><label>사용 계정 (닉네임#태그)</label><input type="text" id="solo-acc"></div>
                <div class="box"><label>참여 인원 (본인 포함)</label><input type="number" id="solo-play" value="1"></div>
                <div class="box"><label>펀딩 총액 (개)</label><input type="number" id="solo-fund"></div>
                <div class="box" style="grid-column: span 2;"><label>라인업 정보</label><input type="text" id="solo-mem"></div>
                <div class="box" style="grid-column: span 2;"><label>메모</label><input type="text" id="solo-memo"></div>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">데이터 저장하기</button>
            <button type="button" id="cancel-btn" class="submit-btn" style="background:#aaa; display:none;" onclick="location.reload()">수정 취소</button>
        </form>
    </div>

    <div class="card table-card">
        <h3 style="color:var(--sub); margin-bottom:15px;">기존 데이터 관리</h3>
        <table class="table">
            <thead><tr><th>날짜</th><th>내용</th><th>결과</th><th>관리</th></tr></thead>
            <tbody id="manage-list"></tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // 🔒 비밀번호 설정 (원하시는 걸로 수정하세요)
    const ADMIN_PW = "zkzk8703!"; 

    const SUPABASE_URL = 'https://ilwpkjdwizzjmcmfmvig.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_2IN7qgG_rvB6kcggisbmxA_XqInFAgy';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let mode = 'ck';

    // 보안 체크 로직
    function checkAuth() {
        if (localStorage.getItem("ani_lab_admin") !== "granted") {
            const pw = prompt("관리자 비밀번호를 입력하세요.");
            if (pw === ADMIN_PW) {
                localStorage.setItem("ani_lab_admin", "granted");
                showAdmin();
            } else {
                alert("인증 실패!");
                location.href = "index.html";
            }
        } else {
            showAdmin();
        }
    }

    function showAdmin() {
        document.getElementById('admin-content').style.display = "block";
        fetchList();
    }

    function adminLogout() {
        localStorage.removeItem("ani_lab_admin");
        location.reload();
    }

    function switchTab(t) {
        mode = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t+'-tab').classList.add('active');
        document.getElementById('ck-fields').style.display = t === 'ck' ? 'grid' : 'none';
        document.getElementById('solo-fields').style.display = t === 'solo' ? 'grid' : 'none';
        fetchList();
    }

    async function fetchList() {
        const table = mode === 'ck' ? 'records' : 'solo_records';
        const { data } = await _supabase.from(table).select('*').order('date', { ascending: false });
        const list = document.getElementById('manage-list'); list.innerHTML = '';
        data?.forEach(item => {
            list.innerHTML += `<tr>
                <td>${item.date}</td>
                <td>${item.title}</td>
                <td>${item.result}</td>
                <td>
                    <button class="action-btn edit" onclick="editMode('${item.id}')">수정</button>
                    <button class="action-btn del" onclick="delData('${item.id}')">삭제</button>
                </td>
            </tr>`;
        });
    }

    async function editMode(id) {
        const table = mode === 'ck' ? 'records' : 'solo_records';
        const { data } = await _supabase.from(table).select('*').eq('id', id).single();
        document.getElementById('edit-id').value = id;
        if(mode === 'ck') {
            document.getElementById('ck-date').value = data.date;
            document.getElementById('ck-title').value = data.title;
            document.getElementById('ck-result').value = data.result;
            document.getElementById('ck-score').value = data.score;
            document.getElementById('ck-pos').value = data.position || 'AD';
            document.getElementById('ck-opp').value = data.opponent;
            document.getElementById('ck-fund').value = data.funding;
            document.getElementById('ck-mem').value = data.members;
            document.getElementById('ck-memo').value = data.memo;
        } else {
            document.getElementById('solo-date').value = data.date;
            document.getElementById('solo-title').value = data.title;
            document.getElementById('solo-result').value = data.result;
            document.getElementById('solo-score').value = data.score;
            document.getElementById('solo-acc').value = data.account;
            document.getElementById('solo-play').value = data.players;
            document.getElementById('solo-fund').value = data.funding;
            document.getElementById('solo-mem').value = data.members;
            document.getElementById('solo-memo').value = data.memo;
        }
        document.getElementById('form-title').innerText = "데이터 수정 중...";
        document.getElementById('submit-btn').innerText = "수정 완료";
        document.getElementById('cancel-btn').style.display = "block";
        window.scrollTo(0,0);
    }

    async function delData(id) {
        if(confirm("정말로 삭제하시겠습니까? 복구할 수 없습니다.")) {
            const table = mode === 'ck' ? 'records' : 'solo_records';
            await _supabase.from(table).delete().eq('id', id);
            fetchList();
        }
    }

    document.getElementById('main-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const table = mode === 'ck' ? 'records' : 'solo_records';
        
        const payload = mode === 'ck' ? {
            date: document.getElementById('ck-date').value,
            title: document.getElementById('ck-title').value,
            result: document.getElementById('ck-result').value,
            score: document.getElementById('ck-score').value,
            position: document.getElementById('ck-pos').value,
            opponent: document.getElementById('ck-opp').value,
            funding: parseInt(document.getElementById('ck-fund').value) || 0,
            members: document.getElementById('ck-mem').value,
            memo: document.getElementById('ck-memo').value
        } : {
            date: document.getElementById('solo-date').value,
            title: document.getElementById('solo-title').value,
            result: document.getElementById('solo-result').value,
            score: document.getElementById('solo-score').value,
            account: document.getElementById('solo-acc').value,
            players: parseInt(document.getElementById('solo-play').value) || 1,
            funding: parseInt(document.getElementById('solo-fund').value) || 0,
            members: document.getElementById('solo-mem').value,
            memo: document.getElementById('solo-memo').value
        };

        if(id) await _supabase.from(table).update(payload).eq('id', id);
        else await _supabase.from(table).insert([payload]);

        alert("데이터가 안전하게 저장되었습니다!");
        location.reload();
    });

    window.onload = checkAuth;
</script>
</body>
</html>
